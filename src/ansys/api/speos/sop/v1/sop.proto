syntax = "proto3";

package ansys.api.speos.sop.v1;

// Manager for SOPTemplates (SOP: Surface Optical Properties)
service SOPTemplatesManager {
	// Create a SOPTemplate
	rpc Create(Create_Request) returns (Create_Response) {}
	// Read a SOPTemplate
	rpc Read(Read_Request) returns (Read_Response) {}
	// Update a SOPTemplate
	rpc Update(Update_Request) returns (Update_Response) {}
	// Delete a SOPTemplate
	rpc Delete(Delete_Request) returns (Delete_Response) {}
	// List all SOPTemplates in manager
	rpc List(List_Request) returns (List_Response) {}
}

// SOP: Surface Optical Properties
// Defines the behavior of light rays when they hit the surface of a body.
message SOPTemplate {
	// Perfect specular surface
	message Mirror {
		double reflectance = 1; // Reflectance, expected from 0. to 100. in % 
	}
	// Transparent or perfectly polished material (glass, plastic)
	message OpticalPolished {}
	message Library {
		string sop_file_uri = 1; // Surface optical properties file, *.scattering, *.bsdf, *.brdf, *.coated, ...
	}
	// Custom made plug-in
	message Plugin {
		string plugin_sop_file_uri = 1; // *.sop plug-in
		string parameters_file_uri = 2; // parameters file needed for the plug-in
	}

	// Activate texture
	message Texture {
		Image image = 1;
		NormalMap normal_map = 2;

		message Image {
			string bitmap_file_uri = 1; // Bitmap
			bool repeat_along_u = 2; // Activate/deactivate the repeatability of the texture image on U axe.
			bool repeat_along_v = 3; // Activate/deactivate the repeatability of the texture image on V axe.
		}

		message NormalMap {
			oneof type {
				FromImage from_image = 1;
				FromNormalMap from_normal_map = 2;
			}
			float roughness = 5;
			bool repeat_along_u = 6; // Activate/deactivate the repeatability of the texture normal map on U axe.
			bool repeat_along_v = 7; // Activate/deactivate the repeatability of the texture normal map on V axe.

			message FromImage {
				string bitmap_file_uri = 1; // Bitmap used to build normal map.
			}
			message FromNormalMap {
				string normal_map_file_uri = 1; // Normal map file.
			}
		}
	}

	string name = 1; // SOPTemplate name
	string description = 2; // SOPTemplate description
	map<string, string> metadata = 7; // User defined metadata
	oneof type {
		Mirror mirror = 3; // Perfect specular surface
		OpticalPolished optical_polished = 4; // Transparent or perfectly polished material (glass, plastic)
		Library library = 5; // Based on surface optical properties file
		Plugin plugin = 6; // Custom made plug-in
	}

	Texture texture = 8; // Define to activate texture - optional
}

// Request to create a SOPTemplate in SOPTemplatesManager
message Create_Request {
	SOPTemplate sop_template = 1; // SOPTemplate containing its basic characteristics
	optional string guid = 2; // Optional field to specify the guid used in the database. If not set, a unique guid will be generated for that entry and sent back in the Create_Response.
}
message Create_Response {
	string guid = 1; // Guid of the SOPTemplate created in SOPTemplatesManager
}

// Request to read a SOPTemplate in SOPTemplatesManager
message Read_Request {
	string guid = 1; // Guid of the SOPTemplate to be read
}
message Read_Response {
	SOPTemplate sop_template = 1; // SOPTemplate corresponding to the guid given in Read_Request
}

// Request to update a SOPTemplate in SOPTemplatesManager
message Update_Request {
	string guid = 1; // Guid of the SOPTemplate to be updated
	SOPTemplate sop_template = 2; // SOPTemplate that will be used for the update
}
message Update_Response {}

// Request to delete a SOPTemplate in SOPTemplatesManager
message Delete_Request {
	string guid = 1; // Guid of the SOPTemplate to be deleted
}
message Delete_Response {}

message List_Request {}
message List_Response {
	repeated string guids = 1; // Guids of the SOPTemplates in SOPTemplatesManager
}

// Actions available on a SOPTemplate
service SOPTemplateActions {

	// Evaluate a custom selection of metrics with optional per-metric parameters. If config is not provided, all metrics are evaluated with default parameters.
	rpc EvaluateMetrics(EvaluateMetrics_Request) returns (EvaluateMetrics_Response) {}
}

// Definition of the impact for which the BSDF will be evaluated
message ImpactDefinition {
	double theta_in = 1; // Incidence angle in degree for the incoming ray. If not set, the default value will be 0 degree (normal incidence).
	double phi_in = 2; // Anisotropic angle in degree for the incoming ray. If not set, the default value will be 0 degree.
	double wavelength = 3; // Wavelength in nm for the incoming ray. If not set, the default value will be 550 nm.
	double theta_out = 4; // Outgoing angles in degree for which the metrics will be computed. If not set, the default value will be 0 degree.
	double phi_out = 5; // Outgoing anisotropic angles in degree for the outgoing ray. If not set, the default value will be 0 degree.
}

// Variable to sweep for slice evaluation
enum SweepVariable {
	SWEEP_VARIABLE_UNSPECIFIED = 0;
	SWEEP_VARIABLE_THETA_IN = 1;
	SWEEP_VARIABLE_PHI_IN = 2;
	SWEEP_VARIABLE_THETA_OUT = 3;
	SWEEP_VARIABLE_PHI_OUT = 4;
	SWEEP_VARIABLE_WAVELENGTH = 5;
}

// Request to evaluate the BSDF along a 2D slice by sweeping one variable
message BSDFSlicesConfig {

	message SliceConfig{
	// Fixed values for all impact variables (the chosen variable will be swept along the range defined below)
	ImpactDefinition fixed_values = 1;
	// Which variable to sweep
	SweepVariable sweep_variable = 2;
	// Start of the sweep range (in degrees or nm depending on variable)
	double sweep_start = 3;
	// End of the sweep range (in degrees or nm depending on variable)
	double sweep_end = 4;
	// Number of equispaced samples in [sweep_start, sweep_end]
	uint32 num_samples = 5;}

	repeated SliceConfig slices = 1; // List of slices to evaluate. If empty, use default config.
}

// Parameters for the global RTA metric
message GlobalRTAConfig {
	repeated double wavelengths = 1; // Wavelengths in nm; if empty, kernel defaults are used
}

// Parameters for the directional RTA metric
message DirectionalRTAConfig {
	repeated ImpactDefinition impacts = 1; // Impact definitions to evaluate; if empty, kernel defaults are used
}

// Configuration for custom metrics evaluation.
// Each field is optional: if the message field is set, that metric is evaluated with the given parameters; if absent, it is skipped.
// To add a new metric: add a NewMetricConfig field here and a NewMetricResult field in EvaluateMetrics_Response.
message MetricsConfig {
	GlobalRTAConfig global_rta = 1;           // If set, evaluate global RTA
	DirectionalRTAConfig directional_rta = 2; // If set, evaluate directional RTA
	BSDFSlicesConfig bsdf_slices = 3;           // If set, evaluate BSDF slices
}

// Request to evaluate a custom selection of metrics with optional per-metric parameters
message EvaluateMetrics_Request {
	string sop_guid = 1;        // Guid of the SOPTemplate to evaluate
	string vop_before_guid = 2; // Guid of the ambient VOP before interaction
	string vop_after_guid = 3;  // Guid of the VOP after interaction with the surface
	MetricsConfig config = 4;   // Metrics to evaluate and their parameters. If not set, evaluate all metrics using default configuration.
}

// Global RTA evaluation results
message GlobalRTAResult {
	message Sample {
		double wavelength = 1;    // Wavelength in nm
		double reflectance = 2;   // Global reflectance, in the range [0, 1]
		double transmittance = 3; // Global transmittance, in the range [0, 1]
		double absorbance = 4;    // Global absorbance, in the range [0, 1]; can be < 0 due to numerical approximation
	}
	repeated Sample samples = 1;
}

// Directional RTA evaluation results
message DirectionalRTAResult {
	message Sample {
		ImpactDefinition inputs = 1; // Impact definition for this sample
		double reflectance = 2;      // Directional reflectance, in the range [0, 1]
		double transmittance = 3;    // Directional transmittance, in the range [0, 1]
		double absorbance = 4;       // Directional absorbance, in the range [0, 1]; can be < 0 due to numerical approximation
	}
	repeated Sample samples = 1;
}

// BSDF slice evaluation results
message BSDFSlicesResult {
	message Slice{
		message Sample {
			double swept_variable_value = 1; // Value of the swept variable for this sample
			double bsdf_value = 2;			 // BSDF value for this sample
		}
		ImpactDefinition inputs = 1;		// Fixed impact definition for this slice (excluding swept variable)
		repeated Sample samples = 1;		// Samples along the swept variable
	}
	repeated Slice slices = 1;				// Results for each slice evaluated
}


// Unified response for EvaluateAllMetrics and EvaluateMetrics.
// Fields are populated only for metrics that were requested (or all fields for EvaluateAllMetrics).
message EvaluateMetrics_Response {
	GlobalRTAResult global_rta = 1;           // Global RTA results; absent if not evaluated
	DirectionalRTAResult directional_rta = 2; // Directional RTA results; absent if not evaluated
	BSDFSlicesResult bsdf_slices = 3;		  // BSDF slice results; absent if not evaluated
}